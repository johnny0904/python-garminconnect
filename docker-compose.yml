services:
  db:
    image: postgres:16
    container_name: health-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: healthpassword
      POSTGRES_DB: health
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - health-net

volumes:
  db_data:
  vendor_data:

networks:
  health-net:
    driver: bridge
